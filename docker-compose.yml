name: learnloop

x-app-env: &app-env
  APP_ENV: ${APP_ENV:-development}
  APP_HOST: ${APP_HOST:-0.0.0.0}
  APP_PORT: ${APP_PORT:-8000}
  APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
  MONGODB_URI: ${MONGODB_URI:-mongodb://localhost:27017/learnloop?replicaSet=rs0&directConnection=true}
  MONGODB_DATABASE: ${MONGODB_DATABASE:-learnloop}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://localhost:9000}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-replace-me}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-replace-me}
  S3_BUCKET: ${S3_BUCKET:-learnloop-media}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}

services:
  mongodb:
    image: mongo:4.4
    container_name: learnloop-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/docker/mongodb-start-replica.sh:/scripts/mongodb-start-replica.sh:ro
      - ./scripts/docker/mongodb-init-replica.js:/scripts/mongodb-init-replica.js:ro
    command: ["/bin/bash", "/scripts/mongodb-start-replica.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongo --quiet --host 127.0.0.1 --port 27017 --eval 'try { rs.status().ok === 1 ? quit(0) : quit(1) } catch (error) { quit(1) }'",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  rustfs-volume-init:
    image: alpine:3.20
    container_name: learnloop-rustfs-volume-init
    restart: "no"
    command:
      [
        "sh",
        "-ec",
        "chown -R 10001:10001 /data0 /data1 /data2 /data3",
      ]
    volumes:
      - rustfs_data_0:/data0
      - rustfs_data_1:/data1
      - rustfs_data_2:/data2
      - rustfs_data_3:/data3

  rustfs:
    image: rustfs/rustfs:latest
    container_name: learnloop-rustfs
    restart: unless-stopped
    depends_on:
      rustfs-volume-init:
        condition: service_completed_successfully
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_VOLUMES: /data/rustfs{0...3}
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:-replace-me}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:-replace-me}
      RUSTFS_OBS_LOGGER_LEVEL: info
      RUSTFS_UNSAFE_BYPASS_DISK_CHECK: "true"
    volumes:
      - rustfs_data_0:/data/rustfs0
      - rustfs_data_1:/data/rustfs1
      - rustfs_data_2:/data/rustfs2
      - rustfs_data_3:/data/rustfs3
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9000/health >/dev/null && curl -fsS http://127.0.0.1:9001/rustfs/console/health >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  rustfs-bootstrap:
    image: minio/mc:latest
    container_name: learnloop-rustfs-bootstrap
    profiles: ["bootstrap"]
    restart: "no"
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      <<: *app-env
    entrypoint: ["/bin/sh", "-ec"]
    command: >
      until mc alias set learnloop http://rustfs:9000 "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY"; do
        sleep 2;
      done;
      mc mb --ignore-existing "learnloop/$$S3_BUCKET";
      mc ls learnloop;

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnloop-app
    restart: unless-stopped
    env_file:
      - .env.example
    depends_on:
      mongodb:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      MONGODB_URI: mongodb://mongodb:27017/learnloop?replicaSet=rs0&directConnection=true
      MONGODB_DATABASE: ${MONGODB_DATABASE:-learnloop}
      S3_ENDPOINT: http://rustfs:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-replace-me}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-replace-me}
      S3_BUCKET: ${S3_BUCKET:-learnloop-media}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      VLM_ENDPOINT: ${VLM_ENDPOINT:-https://example-vlm-provider.invalid/api}
      VLM_MODEL: ${VLM_MODEL:-replace-me}
      VLM_API_KEY: ${VLM_API_KEY:-replace-me}
      VLM_TIMEOUT_SECONDS: ${VLM_TIMEOUT_SECONDS:-120}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-ll_session}
      SESSION_SECURE: ${SESSION_SECURE:-false}
      SESSION_SAMESITE: ${SESSION_SAMESITE:-lax}
    command:
      - /bin/sh
      - -ec
      - |
        python - <<'PY'
        import os
        import time
        import urllib.request

        from pymongo import MongoClient

        mongo_uri = os.environ["MONGODB_URI"]
        object_storage_health_url = "http://rustfs:9000/health"
        deadline = time.time() + 60
        last_error = "dependency readiness timed out"

        while time.time() < deadline:
            try:
                MongoClient(mongo_uri, serverSelectionTimeoutMS=3000).admin.command("ping")
                with urllib.request.urlopen(object_storage_health_url, timeout=3) as response:
                    if 200 <= response.status < 400:
                        break
                    last_error = f"unexpected object storage health status: {response.status}"
            except Exception as exc:  # pragma: no cover - startup only
                last_error = str(exc)
                time.sleep(2)
        else:
            raise SystemExit(last_error)
        PY
        exec uv run --frozen uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import os
          import sys
          import urllib.request

          from pymongo import MongoClient

          def http_ok(url: str) -> bool:
              try:
                  with urllib.request.urlopen(url, timeout=3) as response:
                      return 200 <= response.status < 400
              except Exception:
                  return False

          try:
              MongoClient(os.environ["MONGODB_URI"], serverSelectionTimeoutMS=3000).admin.command("ping")
          except Exception:
              sys.exit(1)

          object_storage_ok = http_ok("http://rustfs:9000/health")
          app_ok = any(
              http_ok(url)
              for url in (
                  "http://127.0.0.1:8000/api/v1/health",
                  "http://127.0.0.1:8000/api/health",
              )
          )

          sys.exit(0 if object_storage_ok and app_ok else 1)
          PY
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: learnloop-frontend
    restart: unless-stopped
    env_file:
      - .env.example
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  mongodb_data:
  rustfs_data_0:
  rustfs_data_1:
  rustfs_data_2:
  rustfs_data_3:
