name: PR Checks

on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: |
            backend/pyproject.toml
            backend/uv.lock

      - name: Run backend test suite
        working-directory: backend
        run: uv run --frozen pytest

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test -- --run

  docker-smoke-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e46817165094654c6fae5c3f524c6d6e735042ae # v3.11.0

      - name: Create .env file
        run: |
          echo "VLM_API_KEY=ci-placeholder" >> .env
          echo "S3_ACCESS_KEY=minioadmin" >> .env
          echo "S3_SECRET_KEY=minioadmin" >> .env

      - name: Build and start services
        run: docker compose up -d --build --wait
        env:
          DOCKER_BUILDKIT: 1

      - name: Create S3 bucket
        run: docker compose --profile bootstrap run --rm rustfs-bootstrap

      - name: Smoke test backend health
        run: curl -fsS http://localhost:8000/api/health

      - name: Smoke test frontend health
        run: curl -fsS http://localhost:8080/healthz

      - name: Tear down
        if: always()
        run: docker compose down --volumes
